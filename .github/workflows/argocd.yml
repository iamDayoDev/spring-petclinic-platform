name: Deploy Petclinic App via Argo CD

on:
  # push:
  #   # branches:
  #   #   - main
  #   #   - ft/app-pipeline
  #   paths:
  #     - "argocd/**"
  #     - "helm/**"
  #     - ".github/workflows/argocd.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy."
        required: false
        type: string
  repository_dispatch:
    types:
      - app-image-built

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  RELEASE_NAME: petclinic
  APP_NAMESPACE: petclinic
  ARGOCD_NAMESPACE: argocd
  DOMAIN_NAME: ${{ vars.DOMAIN_NAME || '' }}
  ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN || '' }}
  TF_VARS_FILE: terraform/environment/dev.tfvars
  VALUES_FILE: helm/petclinic/values.yaml
  APPLICATION_MANIFEST: argocd/application.yml

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    name: Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: gha-deploy-${{ github.run_id }}
          unset-current-credentials: true

      - name: Resolve deploy context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          IMAGE_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_REPOSITORY_PREFIX="$(awk -F'"' '/^repository_prefix[[:space:]]*=/ { print $2; exit }' "$TF_VARS_FILE")"
          TF_DOMAIN_NAME="$(awk -F'"' '/^domain[[:space:]]*=/ { print $2; exit }' "$TF_VARS_FILE")"
          RESOLVED_DOMAIN_NAME="${DOMAIN_NAME:-$TF_DOMAIN_NAME}"
          IMAGE_TAG=""
          SOURCE_REPOSITORY=""
          SOURCE_SHA=""
          INGRESS_ENABLED="false"
          INGRESS_HOST=""
          INGRESS_CERTIFICATE_ARN=""

          if [ -z "$IMAGE_REPOSITORY_PREFIX" ]; then
            echo "Unable to resolve repository_prefix from '$TF_VARS_FILE'." >&2
            exit 1
          fi

          if [ -n "$RESOLVED_DOMAIN_NAME" ] || [ -n "${ACM_CERTIFICATE_ARN:-}" ]; then
            if [ -z "$RESOLVED_DOMAIN_NAME" ] || [ -z "${ACM_CERTIFICATE_ARN:-}" ]; then
              echo "Set both DOMAIN_NAME and ACM_CERTIFICATE_ARN to enable ingress." >&2
              exit 1
            fi
            INGRESS_ENABLED="true"
            INGRESS_HOST="$RESOLVED_DOMAIN_NAME"
            INGRESS_CERTIFICATE_ARN="$ACM_CERTIFICATE_ARN"
          fi

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            IMAGE_TAG="${{ github.event.client_payload.image_tag }}"
            SOURCE_REPOSITORY="${{ github.event.client_payload.source_repository }}"
            SOURCE_SHA="${{ github.event.client_payload.source_sha }}"

            if [ -z "$IMAGE_TAG" ]; then
              IMAGE_TAG="${{ github.event.client_payload.sha }}"
            fi

            if [ -z "$SOURCE_SHA" ]; then
              SOURCE_SHA="${{ github.event.client_payload.sha }}"
            fi
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="$(awk '/^  tag: / { print $2; exit }' "$VALUES_FILE")"
          fi

          if [ -z "$IMAGE_TAG" ]; then
            echo "No image tag was provided. Pass workflow_dispatch.inputs.image_tag or repository_dispatch.client_payload.image_tag." >&2
            exit 1
          fi

          echo "image_registry=$IMAGE_REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image_repository_prefix=$IMAGE_REPOSITORY_PREFIX" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "resolved_domain_name=$RESOLVED_DOMAIN_NAME" >> "$GITHUB_OUTPUT"
          echo "ingress_enabled=$INGRESS_ENABLED" >> "$GITHUB_OUTPUT"
          echo "ingress_host=$INGRESS_HOST" >> "$GITHUB_OUTPUT"
          echo "ingress_certificate_arn=$INGRESS_CERTIFICATE_ARN" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Validate cluster prerequisites
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl get namespace "$ARGOCD_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$ARGOCD_NAMESPACE' does not exist. Install the Argo CD addon before running deploy.yml." >&2
            exit 1
          fi

          if ! kubectl get crd applications.argoproj.io >/dev/null 2>&1; then
            echo "Argo CD CRDs are missing. Install the Argo CD addon before running deploy.yml." >&2
            exit 1
          fi

          kubectl create namespace "$APP_NAMESPACE" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Create or update OpenAI secret
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "GitHub secret 'OPENAI_API_KEY' is missing or empty." >&2
            exit 1
          fi

          kubectl create secret generic openai-secret \
            --namespace "$APP_NAMESPACE" \
            --from-literal=SPRING_AI_OPENAI_API_KEY="$OPENAI_API_KEY" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Create or update Argo CD repository credential
        if: ${{ secrets.ARGOCD_REPO_TOKEN != '' }}
        shell: bash
        env:
          ARGOCD_REPO_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          set -euo pipefail

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: petclinic-platform-repo
            namespace: ${ARGOCD_NAMESPACE}
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: https://github.com/Achievers11-DevOps/petclinic-k8s-platform.git
            username: x-access-token
            password: ${ARGOCD_REPO_TOKEN}
          EOF

      - name: Lint chart
        run: helm lint helm/petclinic

      - name: Render desired application values
        shell: bash
        env:
          IMAGE_REGISTRY: ${{ steps.context.outputs.image_registry }}
          IMAGE_REPOSITORY_PREFIX: ${{ steps.context.outputs.image_repository_prefix }}
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          INGRESS_ENABLED: ${{ steps.context.outputs.ingress_enabled }}
          INGRESS_HOST: ${{ steps.context.outputs.ingress_host }}
          INGRESS_CERTIFICATE_ARN: ${{ steps.context.outputs.ingress_certificate_arn }}
          VALUES_FILE: ${{ env.VALUES_FILE }}
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ["VALUES_FILE"])
          lines = path.read_text().splitlines()
          section = None

          def quote(value: str) -> str:
              escaped = value.replace("\\", "\\\\").replace('"', '\\"')
              return f'"{escaped}"'

          image_updates = {
              "registry": quote(os.environ["IMAGE_REGISTRY"]),
              "repositoryPrefix": quote(os.environ["IMAGE_REPOSITORY_PREFIX"]),
              "tag": quote(os.environ["IMAGE_TAG"]),
          }

          ingress_enabled = os.environ["INGRESS_ENABLED"].lower() == "true"
          ingress_updates = {
              "enabled": "true" if ingress_enabled else "false",
              "host": quote(os.environ["INGRESS_HOST"]) if ingress_enabled else '""',
              "certificateArn": quote(os.environ["INGRESS_CERTIFICATE_ARN"]) if ingress_enabled else '""',
          }

          exposure_updates = {
              "apiGatewayServiceType": quote("ClusterIP" if ingress_enabled else "LoadBalancer"),
          }

          rendered = []
          for line in lines:
              stripped = line.strip()
              if line and not line.startswith(" "):
                  section = stripped[:-1] if stripped.endswith(":") else None

              if section == "image" and line.startswith("  "):
                  key = stripped.split(":", 1)[0]
                  if key in image_updates:
                      rendered.append(f"  {key}: {image_updates[key]}")
                      continue

              if section == "exposure" and line.startswith("  "):
                  key = stripped.split(":", 1)[0]
                  if key in exposure_updates:
                      rendered.append(f"  {key}: {exposure_updates[key]}")
                      continue

              if section == "ingress" and line.startswith("  "):
                  key = stripped.split(":", 1)[0]
                  if key in ingress_updates:
                      rendered.append(f"  {key}: {ingress_updates[key]}")
                      continue

              rendered.append(line)

          path.write_text("\n".join(rendered) + "\n")
          PY

      - name: Commit desired state
        id: gitops
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "$VALUES_FILE"; then
            echo "values_changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_FILE"
          git commit -m "chore: promote petclinic image to ${{ steps.context.outputs.image_tag }}"
          git push

          echo "values_changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Apply Argo CD application
        shell: bash
        run: |
          set -euo pipefail

          kubectl apply -f "$APPLICATION_MANIFEST"
          kubectl annotate application "$RELEASE_NAME" \
            --namespace "$ARGOCD_NAMESPACE" \
            argocd.argoproj.io/refresh=hard \
            --overwrite

      - name: Wait for Argo CD sync
        id: application
        shell: bash
        run: |
          set -euo pipefail

          for _ in $(seq 1 80); do
            SYNC_STATUS="$(kubectl get application "$RELEASE_NAME" \
              --namespace "$ARGOCD_NAMESPACE" \
              --output jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            HEALTH_STATUS="$(kubectl get application "$RELEASE_NAME" \
              --namespace "$ARGOCD_NAMESPACE" \
              --output jsonpath='{.status.health.status}' 2>/dev/null || true)"
            SYNC_REVISION="$(kubectl get application "$RELEASE_NAME" \
              --namespace "$ARGOCD_NAMESPACE" \
              --output jsonpath='{.status.sync.revision}' 2>/dev/null || true)"

            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "sync_status=$SYNC_STATUS" >> "$GITHUB_OUTPUT"
              echo "health_status=$HEALTH_STATUS" >> "$GITHUB_OUTPUT"
              echo "sync_revision=$SYNC_REVISION" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 15
          done

          kubectl get application "$RELEASE_NAME" --namespace "$ARGOCD_NAMESPACE" -o yaml || true
          echo "Argo CD did not reach Synced/Healthy within the timeout window." >&2
          exit 1

      - name: Wait for public hostname
        id: endpoint
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.context.outputs.ingress_enabled }}" = "true" ]; then
            for _ in $(seq 1 40); do
              PUBLIC_HOST="$(kubectl get ingress "${RELEASE_NAME}-ingress" \
                --namespace "$APP_NAMESPACE" \
                --output jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
              if [ -n "$PUBLIC_HOST" ]; then
                echo "public_host=$PUBLIC_HOST" >> "$GITHUB_OUTPUT"
                echo "endpoint_mode=ingress" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              sleep 15
            done

            echo "Ingress hostname was not assigned within the timeout window." >&2
            exit 1
          fi

          for _ in $(seq 1 40); do
            PUBLIC_HOST="$(kubectl get service api-gateway \
              --namespace "$APP_NAMESPACE" \
              --output jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$PUBLIC_HOST" ]; then
              echo "public_host=$PUBLIC_HOST" >> "$GITHUB_OUTPUT"
              echo "endpoint_mode=service" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done

          echo "Service LoadBalancer hostname was not assigned within the timeout window." >&2
          exit 1

      - name: Deployment summary
        if: always()
        shell: bash
        env:
          PUBLIC_HOST: ${{ steps.endpoint.outputs.public_host }}
          ENDPOINT_MODE: ${{ steps.endpoint.outputs.endpoint_mode }}
        run: |
          if [ -n "${{ steps.context.outputs.ingress_host }}" ]; then
            APP_URL="https://${{ steps.context.outputs.ingress_host }}"
          elif [ -n "${PUBLIC_HOST:-}" ]; then
            APP_URL="http://${PUBLIC_HOST}"
          else
            APP_URL="pending"
          fi

          {
            echo "### Application deployment"
            echo "- Cluster: \`$CLUSTER_NAME\`"
            echo "- Namespace: \`$APP_NAMESPACE\`"
            echo "- Argo CD namespace: \`$ARGOCD_NAMESPACE\`"
            echo "- Application: \`$RELEASE_NAME\`"
            echo "- Image registry: \`${{ steps.context.outputs.image_registry }}\`"
            echo "- Image repository prefix: \`${{ steps.context.outputs.image_repository_prefix }}\`"
            echo "- Image tag: \`${{ steps.context.outputs.image_tag }}\`"
            echo "- Desired state updated: \`${{ steps.gitops.outputs.values_changed || 'false' }}\`"
            echo "- Desired state revision: \`${{ steps.gitops.outputs.commit_sha || github.sha }}\`"
            echo "- Argo sync status: \`${{ steps.application.outputs.sync_status || 'pending' }}\`"
            echo "- Argo health status: \`${{ steps.application.outputs.health_status || 'pending' }}\`"
            echo "- Argo synced revision: \`${{ steps.application.outputs.sync_revision || 'pending' }}\`"
            echo "- Source repository: \`${{ steps.context.outputs.source_repository || github.repository }}\`"
            echo "- Source SHA: \`${{ steps.context.outputs.source_sha || steps.context.outputs.image_tag }}\`"
            echo "- Endpoint mode: \`${ENDPOINT_MODE:-pending}\`"
            echo "- Public hostname: \`${PUBLIC_HOST:-pending}\`"
            echo "- App host: \`${{ steps.context.outputs.ingress_host || 'pending' }}\`"
            echo "- App URL: \`${APP_URL}\`"
            echo "- Infra/bootstrap actions: managed outside this workflow"
          } >> "$GITHUB_STEP_SUMMARY"
