name: CI/CD

on:
  push:
    branches:
      - main

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker images with Maven
        run: ./mvnw clean install -P buildDocker -Dmaven.test.skip=true

      - name: Tag and push images to ECR
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          SERVICES=(
            config-server
            discovery-server
            api-gateway
            customers-service
            vets-service
            visits-service
            admin-server
            genai-service
          )
          for SERVICE in "${SERVICES[@]}"; do
            LOCAL_IMAGE="springcommunity/spring-petclinic-${SERVICE}:latest"
            REMOTE_IMAGE="${ECR_REGISTRY}/${SERVICE}:${GIT_SHA}"
            echo "Pushing ${REMOTE_IMAGE}"
            docker tag  "${LOCAL_IMAGE}" "${REMOTE_IMAGE}"
            docker push "${REMOTE_IMAGE}"
          done

      - name: Clone petclinic-platform
        env:
          PLATFORM_REPO_PAT: ${{ secrets.PLATFORM_REPO_PAT }}
        run: |
          git clone https://x-access-token:${PLATFORM_REPO_PAT}@github.com/etaoko333/petclinic-platform.git \
            /tmp/petclinic-platform

      - name: Update image tag in values.yaml
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          VALUES=/tmp/petclinic-platform/helm/petclinic/values.yaml
          sed -i "s/^  tag: .*/  tag: ${GIT_SHA}/" "${VALUES}"
          echo "Updated tag to ${GIT_SHA}:"
          grep "tag:" "${VALUES}"

      - name: Commit and push tag update
        env:
          GIT_SHA: ${{ github.sha }}
          PLATFORM_REPO_PAT: ${{ secrets.PLATFORM_REPO_PAT }}
        run: |
          cd /tmp/petclinic-platform
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/petclinic/values.yaml
          git commit -m "chore: deploy ${GIT_SHA::7} [skip ci]"
          git push https://x-access-token:${PLATFORM_REPO_PAT}@github.com/etaoko333/petclinic-platform.git main
