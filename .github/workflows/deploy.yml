name: Deploy Petclinic App

on:
  push:
    branches:
      - main
      - ft/app-pipeline
    paths:
      - "helm/**"
      - ".github/workflows/deploy.yml"
  
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy."
        required: false
        type: string
  repository_dispatch:
    types:
    - app-image-built

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  RELEASE_NAME: petclinic
  APP_NAMESPACE: petclinic
  DOMAIN_NAME: ${{ vars.DOMAIN_NAME || '' }}
  ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN || '' }}
  TF_VARS_FILE: terraform/environment/dev.tfvars

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: gha-deploy-${{ github.run_id }}
          unset-current-credentials: true

      - name: Resolve deploy context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          IMAGE_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_REPOSITORY_PREFIX="$(awk -F'"' '/^repository_prefix[[:space:]]*=/ { print $2; exit }' "$TF_VARS_FILE")"
          IMAGE_TAG=""
          SOURCE_REPOSITORY=""
          SOURCE_SHA=""

          if [ -z "$IMAGE_REPOSITORY_PREFIX" ]; then
            echo "Unable to resolve repository_prefix from '$TF_VARS_FILE'." >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            IMAGE_TAG="${{ github.event.client_payload.sha }}"
            SOURCE_REPOSITORY="${{ github.event.client_payload.source_repository }}"
            SOURCE_SHA="${{ github.event.client_payload.sha }}"
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="$(awk '/^  tag: / { print $2; exit }' helm/petclinic/values.yaml)"
          fi

          if [ -z "$IMAGE_TAG" ]; then
            echo "No image tag was provided. Pass workflow_dispatch.inputs.image_tag or repository_dispatch.client_payload.image_tag." >&2
            exit 1
          fi

          echo "image_registry=$IMAGE_REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image_repository_prefix=$IMAGE_REPOSITORY_PREFIX" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Validate cluster prerequisites
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl get namespace "$APP_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$APP_NAMESPACE' does not exist. Bootstrap prerequisites must be provisioned before running deploy.yml." >&2
            exit 1
          fi

      - name: Create or update OpenAI secret
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "GitHub secret 'OPENAI_API_KEY' is missing or empty." >&2
            exit 1
          fi

          kubectl create secret generic openai-secret \
            --namespace "$APP_NAMESPACE" \
            --from-literal=SPRING_AI_OPENAI_API_KEY="$OPENAI_API_KEY" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Lint chart
        run: helm lint helm/petclinic

      - name: Deploy Helm release
        shell: bash
        run: |
          set -euo pipefail

          helm upgrade --install "$RELEASE_NAME" helm/petclinic \
            --namespace "$APP_NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 15m \
            --set exposure.apiGatewayServiceType=LoadBalancer \
            --set ingress.enabled=false \
            --set "image.registry=${{ steps.context.outputs.image_registry }}" \
            --set "image.repositoryPrefix=${{ steps.context.outputs.image_repository_prefix }}" \
            --set "image.tag=${{ steps.context.outputs.image_tag }}"

      - name: Wait for ingress hostname
        id: ingress
        shell: bash
        run: |
          set -euo pipefail

          for _ in $(seq 1 40); do
            ALB_HOST="$(kubectl get ingress "${RELEASE_NAME}-ingress" \
              --namespace "$APP_NAMESPACE" \
              --output jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$ALB_HOST" ]; then
              echo "alb_host=$ALB_HOST" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done

          echo "ALB hostname was not assigned within the timeout window." >&2
          exit 1

      - name: Deployment summary
        if: always()
        shell: bash
        env:
          INGRESS_HOST: ${{ steps.ingress.outputs.alb_host }}
        run: |
          {
            echo "### Application deployment"
            echo "- Cluster: \`$CLUSTER_NAME\`"
            echo "- Namespace: \`$APP_NAMESPACE\`"
            echo "- Release: \`$RELEASE_NAME\`"
            echo "- Image registry: \`${{ steps.context.outputs.image_registry }}\`"
            echo "- Image repository prefix: \`${{ steps.context.outputs.image_repository_prefix }}\`"
            echo "- Image tag: \`${{ steps.context.outputs.image_tag }}\`"
            echo "- Source repository: \`${{ steps.context.outputs.source_repository || github.repository }}\`"
            echo "- Source SHA: \`${{ steps.context.outputs.source_sha || steps.context.outputs.image_tag }}\`"
            echo "- Ingress host: \`${INGRESS_HOST:-pending}\`"
            echo "- App URL: \`https://$DOMAIN_NAME\`"
            echo "- Infra/bootstrap actions: managed outside this workflow"
          } >> "$GITHUB_STEP_SUMMARY"
