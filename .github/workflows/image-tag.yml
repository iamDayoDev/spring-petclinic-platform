name: Update Image Tag

on:
  repository_dispatch:
    types: [app-image-built]

permissions:
  contents: write

env:
  DEV_GITOPS_BRANCH: ${{ vars.DEV_GITOPS_BRANCH || 'ft/app-pipeline' }}
  PROD_GITOPS_BRANCH: ${{ vars.PROD_GITOPS_BRANCH || 'main' }}

jobs:
  update-tag:
    name: Update service image tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          ref: main
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve GitOps context
        id: context
        shell: bash
        env:
          SERVICE: ${{ github.event.client_payload.service || github.event.client_payload.service_name || github.event.client_payload.app || github.event.client_payload.repository || github.event.client_payload.repo || '' }}
          SERVICES: ${{ github.event.client_payload.services || '' }}
          IMAGE_TAG: ${{ github.event.client_payload.image_tag || github.event.client_payload.sha }}
          DEPLOY_ENVIRONMENT: ${{ github.event.client_payload.environment || '' }}
          DEV_GITOPS_BRANCH: ${{ env.DEV_GITOPS_BRANCH }}
          PROD_GITOPS_BRANCH: ${{ env.PROD_GITOPS_BRANCH }}
        run: |
          set -euo pipefail

          SERVICE_LIST="${SERVICE:-$SERVICES}"

          if [ -z "${SERVICE_LIST}" ]; then
            echo "client_payload.service is required. Accepted keys: service, service_name, app, repository, repo, or services." >&2
            echo 'Example payload: {"services":"config-server,api-gateway","image_tag":"10e58c5"}' >&2
            exit 1
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "client_payload.image_tag or client_payload.sha is required"
            exit 1
          fi

          UPDATED_SERVICES=""
          TARGETS=""
          RESOLVED_ENV=""

          for raw_service in ${SERVICE_LIST//,/ }; do
            SERVICE_ENV="${DEPLOY_ENVIRONMENT:-}"

            case "${raw_service}" in
              petclinic-prod-*)
                SERVICE_ENV="prod"
                ;;
              petclinic-dev-*)
                SERVICE_ENV="dev"
                ;;
            esac

            SERVICE_ENV="${SERVICE_ENV:-dev}"

            if [ -n "$RESOLVED_ENV" ] && [ "$RESOLVED_ENV" != "$SERVICE_ENV" ]; then
              echo "This workflow run resolved multiple environments ($RESOLVED_ENV and $SERVICE_ENV)." >&2
              echo "Dispatch one environment per run so the image tag is committed to a single GitOps branch." >&2
              exit 1
            fi

            RESOLVED_ENV="$SERVICE_ENV"
            SERVICE="${raw_service#petclinic-dev-}"
            SERVICE="${SERVICE#petclinic-prod-}"

            case "${SERVICE}" in
              admin-server|api-gateway|config-server|customers-service|discovery-server|genai-service|vets-service|visits-service)
                ;;
            *)
              echo "Unsupported service: ${SERVICE}"
              exit 1
              ;;
            esac

            UPDATED_SERVICES="${UPDATED_SERVICES} ${SERVICE}"
            TARGETS="${TARGETS}${SERVICE}:${SERVICE_ENV}"$'\n'
          done

          case "${RESOLVED_ENV:-dev}" in
            dev)
              TARGET_BRANCH="$DEV_GITOPS_BRANCH"
              ;;
            prod)
              TARGET_BRANCH="$PROD_GITOPS_BRANCH"
              ;;
            *)
              echo "Unsupported environment: ${RESOLVED_ENV}" >&2
              exit 1
              ;;
          esac

          if [ -z "${TARGET_BRANCH}" ]; then
            echo "Resolved GitOps branch is empty for environment ${RESOLVED_ENV}." >&2
            exit 1
          fi

          {
            echo "services=${UPDATED_SERVICES# }"
            echo "image_tag=${IMAGE_TAG}"
            echo "deploy_env=${RESOLVED_ENV:-dev}"
            echo "target_branch=${TARGET_BRANCH}"
            echo "targets<<EOF"
            printf '%s' "${TARGETS}"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout target GitOps branch
        shell: bash
        env:
          TARGET_BRANCH: ${{ steps.context.outputs.target_branch }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH"
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git checkout -B "$TARGET_BRANCH"
          fi

      - name: Update service values files
        shell: bash
        env:
          SERVICES: ${{ steps.context.outputs.services }}
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
        run: |
          set -euo pipefail

          for service in $SERVICES; do
            values_file="helm-values/${service}.yaml"

            if [ ! -f "${values_file}" ]; then
              echo "Values file not found: ${values_file}" >&2
              exit 1
            fi

            echo "Updating ${values_file} to image tag ${IMAGE_TAG}"
            sed -i -E "/^image:/,/^[^[:space:]]/ s|^([[:space:]]*tag:).*|\1 \"${IMAGE_TAG}\"|" "${values_file}"

            if ! grep -Fq "  tag: \"${IMAGE_TAG}\"" "${values_file}"; then
              echo "Failed to update image.tag in ${values_file}" >&2
              exit 1
            fi
          done

          git diff -- helm-values/

      - name: Commit updated tag
        id: commit
        shell: bash
        env:
          SERVICES: ${{ steps.context.outputs.services }}
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          TARGET_BRANCH: ${{ steps.context.outputs.target_branch }}
        run: |
          set -euo pipefail

          for service in $SERVICES; do
            git add "helm-values/${service}.yaml"
          done

          if git diff --staged --quiet; then
            echo "No tag change to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update service image tags to ${IMAGE_TAG}"
            git push origin "HEAD:${TARGET_BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Argo CD workflow
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          TARGETS: ${{ steps.context.outputs.targets }}
          TARGET_BRANCH: ${{ steps.context.outputs.target_branch }}
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository || '' }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha || github.event.client_payload.sha || '' }}
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            const targets = process.env.TARGETS
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
              .map((line) => {
                const [service, environment] = line.split(':');
                return { service, environment };
              });

            for (const { service, environment } of targets) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'argocd.yml',
                ref: process.env.TARGET_BRANCH,
                inputs: {
                  service,
                  environment,
                  image_tag: process.env.IMAGE_TAG,
                  source_repository: process.env.SOURCE_REPOSITORY,
                  source_sha: process.env.SOURCE_SHA
                }
              });
            }
