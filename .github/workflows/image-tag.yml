# Update Image Tag Workflow
name: Update Image Tag

on:
  repository_dispatch:
    types: [app-image-built]

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  GITOPS_REPOSITORY: iamDayoDev/spring-petclinic-platform

jobs:
  update-tag:
    name: Update service image tag
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      deploy_matrix: ${{ steps.context.outputs.deploy_matrix }}
      image_tag: ${{ steps.context.outputs.image_tag }}
      source_repository: ${{ steps.context.outputs.source_repository }}
      source_sha: ${{ steps.context.outputs.source_sha }}

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: gha-image-tag-${{ github.run_id }}
          unset-current-credentials: true

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update service values file
        id: context
        shell: bash
        env:
          SERVICE: ${{ github.event.client_payload.service || github.event.client_payload.service_name || github.event.client_payload.app || github.event.client_payload.repository || github.event.client_payload.repo || '' }}
          SERVICES: ${{ github.event.client_payload.services || '' }}
          IMAGE_TAG: ${{ github.event.client_payload.image_tag || github.event.client_payload.sha }}
          DEPLOY_ENVIRONMENT: ${{ github.event.client_payload.environment || '' }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository || '' }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha || github.event.client_payload.sha || '' }}
          ALLOW_MULTIPLE_SERVICES: ${{ github.event.client_payload.allow_multiple_services || '' }}
        run: |
          set -euo pipefail

          SERVICE_LIST="${SERVICE:-$SERVICES}"

          if [ -z "${SERVICE_LIST}" ]; then
            echo "client_payload.service is required. Accepted keys: service, service_name, app, repository, repo, or services." >&2
            echo 'Example payload: {"services":"config-server,api-gateway","image_tag":"10e58c5"}' >&2
            exit 1
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "client_payload.image_tag or client_payload.sha is required"
            exit 1
          fi

          SERVICE_COUNT=0
          for _ in ${SERVICE_LIST//,/ }; do
            SERVICE_COUNT=$((SERVICE_COUNT + 1))
          done

          if [ "${SERVICE_COUNT}" -gt 1 ] && [ "${ALLOW_MULTIPLE_SERVICES}" != "true" ]; then
            echo "Refusing to update multiple services from a single image event." >&2
            echo "Received services: ${SERVICE_LIST}" >&2
            echo "If this was intentional, dispatch with allow_multiple_services=true." >&2
            exit 1
          fi

          UPDATED_SERVICES=""
          DEPLOY_MATRIX_ITEMS=()
          TARGETS=""

          for raw_service in ${SERVICE_LIST//,/ }; do
            SERVICE_ENV="${DEPLOY_ENVIRONMENT:-}"

            case "${raw_service}" in
              petclinic-prod-*)
                SERVICE_ENV="prod"
                ;;
              petclinic-dev-*)
                SERVICE_ENV="dev"
                ;;
            esac

            SERVICE_ENV="${SERVICE_ENV:-dev}"
            SERVICE="${raw_service#petclinic-dev-}"
            SERVICE="${SERVICE#petclinic-prod-}"

            case "${SERVICE}" in
              admin-server|api-gateway|config-server|customers-service|discovery-server|genai-service|vets-service|visits-service)
                ;;
              *)
                echo "Unsupported service: ${SERVICE}"
                exit 1
                ;;
            esac

            values_file="helm-values/${SERVICE}.yaml"

            if [ ! -f "${values_file}" ]; then
              echo "Values file not found: ${values_file}"
              exit 1
            fi

            echo "Updating ${values_file} to image tag ${IMAGE_TAG}"
            sed -i -E "/^image:/,/^[^[:space:]]/ s|^([[:space:]]*tag:).*|\1 \"${IMAGE_TAG}\"|" "${values_file}"

            if ! grep -Fq "  tag: \"${IMAGE_TAG}\"" "${values_file}"; then
              echo "Failed to update image.tag in ${values_file}"
              exit 1
            fi

            UPDATED_SERVICES="${UPDATED_SERVICES} ${SERVICE}"
            DEPLOY_MATRIX_ITEMS+=("{\"service\":\"${SERVICE}\",\"environment\":\"${SERVICE_ENV}\"}")

            ENV_VALUES_FILE="helm-values/${SERVICE_ENV}.yaml"

            if [ ! -f "${ENV_VALUES_FILE}" ]; then
              echo "Environment values file not found: ${ENV_VALUES_FILE}" >&2
              exit 1
            fi

            REPOSITORY_PREFIX="$(awk '
              /^image:/ { in_image=1; next }
              in_image && /^[^[:space:]]/ { exit }
              in_image && /^[[:space:]]*repositoryPrefix:/ {
                sub(/^[[:space:]]*repositoryPrefix:[[:space:]]*/, "", $0)
                gsub(/"/, "", $0)
                print $0
                exit
              }
            ' "${ENV_VALUES_FILE}")"

            if [ -z "${REPOSITORY_PREFIX}" ]; then
              echo "Unable to resolve image.repositoryPrefix from ${ENV_VALUES_FILE}" >&2
              exit 1
            fi

            TARGETS="${TARGETS}${SERVICE}:${SERVICE_ENV}:${REPOSITORY_PREFIX}"$'\n'
          done

          git diff -- helm-values/

          DEPLOY_MATRIX="[$(IFS=,; echo "${DEPLOY_MATRIX_ITEMS[*]}")]"

          {
            echo "services=${UPDATED_SERVICES# }"
            echo "image_tag=${IMAGE_TAG}"
            echo "source_repository=${SOURCE_REPOSITORY}"
            echo "source_sha=${SOURCE_SHA}"
            echo "deploy_matrix=${DEPLOY_MATRIX}"
            echo "targets<<EOF"
            printf '%s' "${TARGETS}"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for images in ECR
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          TARGETS: ${{ steps.context.outputs.targets }}
        run: |
          set -euo pipefail

          while IFS=: read -r SERVICE SERVICE_ENV REPOSITORY_PREFIX; do
            if [ -z "${SERVICE:-}" ]; then
              continue
            fi

            REPOSITORY_NAME="${REPOSITORY_PREFIX}-${SERVICE}"
            echo "Waiting for ECR image ${REPOSITORY_NAME}:${IMAGE_TAG}"

            FOUND="false"
            for _ in $(seq 1 30); do
              if aws ecr describe-images \
                --repository-name "${REPOSITORY_NAME}" \
                --image-ids imageTag="${IMAGE_TAG}" \
                --region "${AWS_REGION}" >/dev/null 2>&1; then
                FOUND="true"
                break
              fi

              sleep 10
            done

            if [ "${FOUND}" != "true" ]; then
              echo "ECR image not found after waiting: ${REPOSITORY_NAME}:${IMAGE_TAG}" >&2
              exit 1
            fi
          done <<< "${TARGETS}"

      - name: Commit updated tag
        id: commit
        shell: bash
        env:
          SERVICES: ${{ steps.context.outputs.services }}
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
        run: |
          set -euo pipefail

          for service in $SERVICES; do
            git add "helm-values/${service}.yaml"
          done

          if git diff --staged --quiet; then
            echo "No tag change to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update service image tags to ${IMAGE_TAG}"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy via Argo CD
    needs: update-tag
    if: needs.update-tag.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.update-tag.outputs.deploy_matrix) }}
    uses: ./.github/workflows/argocd.yml
    with:
      service: ${{ matrix.target.service }}
      environment: ${{ matrix.target.environment }}
      image_tag: ${{ needs.update-tag.outputs.image_tag }}
      source_repository: ${{ needs.update-tag.outputs.source_repository }}
      source_sha: ${{ needs.update-tag.outputs.source_sha }}
    secrets: inherit
