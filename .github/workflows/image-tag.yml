name: Update Image Tag

on:
  repository_dispatch:
    types: [app-image-built]

permissions:
  contents: write

jobs:
  update-tag:
    name: Update service image tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update service values file
        shell: bash
        env:
          SERVICE: ${{ github.event.client_payload.service }}
          IMAGE_TAG: ${{ github.event.client_payload.image_tag || github.event.client_payload.sha }}
        run: |
          set -euo pipefail

          if [ -z "${SERVICE}" ]; then
            echo "client_payload.service is required"
            exit 1
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "client_payload.image_tag or client_payload.sha is required"
            exit 1
          fi

          case "${SERVICE}" in
            admin-server|api-gateway|config-server|customers-service|discovery-server|genai-service|vets-service|visits-service)
              ;;
            *)
              echo "Unsupported service: ${SERVICE}"
              exit 1
              ;;
          esac

          values_file="helm-values/${SERVICE}.yaml"

          if [ ! -f "${values_file}" ]; then
            echo "Values file not found: ${values_file}"
            exit 1
          fi

          echo "Updating ${values_file} to image tag ${IMAGE_TAG}"
          sed -i -E "/^image:/,/^[^[:space:]]/ s|^([[:space:]]*tag:).*|\1 \"${IMAGE_TAG}\"|" "${values_file}"

          if ! grep -Fq "  tag: \"${IMAGE_TAG}\"" "${values_file}"; then
            echo "Failed to update image.tag in ${values_file}"
            exit 1
          fi

          git diff -- "${values_file}"

      - name: Commit updated tag
        id: commit
        shell: bash
        env:
          SERVICE: ${{ github.event.client_payload.service }}
          IMAGE_TAG: ${{ github.event.client_payload.image_tag || github.event.client_payload.sha }}
        run: |
          set -euo pipefail

          git add "helm-values/${SERVICE}.yaml"

          if git diff --staged --quiet; then
            echo "No tag change to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update ${SERVICE} image tag to ${IMAGE_TAG}"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          SERVICE: ${{ github.event.client_payload.service }}
          IMAGE_TAG: ${{ github.event.client_payload.image_tag || github.event.client_payload.sha }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository || '' }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha || github.event.client_payload.sha || '' }}
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'deploy-helm-chart',
              client_payload: {
                service: process.env.SERVICE,
                image_tag: process.env.IMAGE_TAG,
                source_repository: process.env.SOURCE_REPOSITORY,
                source_sha: process.env.SOURCE_SHA
              }
            })
