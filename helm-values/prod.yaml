image:
  registry: 536697234487.dkr.ecr.us-east-1.amazonaws.com
  repositoryPrefix: petclinic-prod
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP

metrics:
  enabled: true

tracing:
  enabled: true
  zipkin:
    endpoint: http://zipkin.monitoring.svc.cluster.local:9411/api/v2/spans
  samplingProbability: "0.1"

resources:
  requests:
    memory: 512Mi
    cpu: 500m
  limits:
    memory: 1024Mi
    cpu: "1"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""
