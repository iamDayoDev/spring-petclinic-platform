externalSecret:
  enabled: true
  name: petclinic-db-secret
  refreshInterval: 1h
  secretStoreName: aws-secrets-manager
  secretStoreKind: ClusterSecretStore
  targetSecretName: mysql-secret
  remoteSecretName: petclinic/database-credentials
  creationPolicy: Owner
  data:
    - secretKey: MYSQL_PASSWORD
      remoteProperty: password
    - secretKey: MYSQL_USER
      remoteProperty: username
    - secretKey: MYSQL_HOST
      remoteProperty: endpoint
    - secretKey: MYSQL_DATABASE
      remoteProperty: dbname
