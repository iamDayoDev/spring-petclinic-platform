apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "petclinic-service.fullname" . }}
  labels:
    {{- include "petclinic-service.commonLabels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "petclinic-service.name" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "petclinic-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "petclinic-service.selectorLabels" . | nindent 8 }}
      {{- if or .Values.metrics.enabled .Values.podAnnotations }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.container.port | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "petclinic-service.serviceAccountName" . }}
      {{- if or .Values.dependencies.configServer.enabled .Values.dependencies.discoveryServer.enabled }}
      initContainers:
        {{- if .Values.dependencies.configServer.enabled }}
        - name: wait-for-config-server
          image: {{ .Values.dependencies.waitImage }}
          command:
            - sh
            - -c
            - |
              until wget -qO /dev/null {{ .Values.dependencies.configServer.url }} 2>/dev/null; do
                echo "waiting for config-server..."; sleep {{ .Values.dependencies.waitIntervalSeconds }};
              done
        {{- end }}
        {{- if .Values.dependencies.discoveryServer.enabled }}
        - name: wait-for-discovery-server
          image: {{ .Values.dependencies.waitImage }}
          command:
            - sh
            - -c
            - |
              until wget -qO /dev/null {{ .Values.dependencies.discoveryServer.url }} 2>/dev/null; do
                echo "waiting for discovery-server..."; sleep {{ .Values.dependencies.waitIntervalSeconds }};
              done
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "petclinic-service.name" . }}
          image: {{ include "petclinic-service.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          {{- if or .Values.spring.profiles .Values.mysql.enabled .Values.openai.enabled .Values.env }}
          env:
            {{- if .Values.spring.profiles }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.spring.profiles | quote }}
            {{- end }}
            {{- if .Values.mysql.enabled }}
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: {{ .Values.mysql.hostKey }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: {{ .Values.mysql.userKey }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: {{ .Values.mysql.passwordKey }}
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: {{ .Values.mysql.databaseKey }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.mysql.datasourceUrl | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: {{ .Values.mysql.userKey }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: {{ .Values.mysql.passwordKey }}
            {{- end }}
            {{- if .Values.openai.enabled }}
            - name: {{ .Values.openai.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.secretName }}
                  key: {{ .Values.openai.key }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or .Values.configMap.enabled .Values.envFrom }}
          envFrom:
            {{- if .Values.configMap.enabled }}
            - configMapRef:
                name: {{ include "petclinic-service.fullname" . }}
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
