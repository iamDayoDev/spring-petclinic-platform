{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "petclinic-service.serviceAccountName" . }}
  labels:
    {{- include "petclinic-service.commonLabels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "petclinic-service.name" . }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
