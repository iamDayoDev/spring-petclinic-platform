{{- $root := . }}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "petclinic.commonLabels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      {{- include "petclinic.selectorLabels" (dict "name" $name "release" $root.Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "petclinic.selectorLabels" (dict "name" $name "release" $root.Release.Name) | nindent 8 }}
    spec:
      {{- if ne $name "config-server" }}
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO /dev/null http://config-server:8888/actuator/health 2>/dev/null; do
                echo "waiting for config-server..."; sleep 3
              done
        {{- if or $svc.mysql $svc.waitForDiscovery }}
        - name: wait-for-discovery-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO /dev/null http://discovery-server:8761/actuator/health 2>/dev/null; do
                echo "waiting for discovery-server..."; sleep 3
              done
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "petclinic.image" (dict "registry" $root.Values.image.registry "name" $name "tag" $root.Values.image.tag) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ $svc.profile | quote }}
            {{- if $svc.mysql }}
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(MYSQL_HOST):3306/$(MYSQL_DATABASE)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            {{- end }}
            {{- if $svc.openaiSecret }}
            - name: SPRING_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: SPRING_AI_OPENAI_API_KEY
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
{{- end }}
