{{- if and .Values.monitoring.podMonitor.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PodMonitor") }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: petclinic
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petclinic.commonLabels" . | nindent 4 }}
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  podMetricsEndpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
{{- end }}
