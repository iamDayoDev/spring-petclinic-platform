{{- $root := . }}
{{- range $name, $svc := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "petclinic.commonLabels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  {{- if eq $name "api-gateway" }}
  type: {{ $root.Values.exposure.apiGatewayServiceType | default "ClusterIP" }}
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  {{- else }}
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
  {{- end }}
  selector:
    {{- include "petclinic.selectorLabels" (dict "name" $name "release" $root.Release.Name) | nindent 4 }}
{{- end }}
