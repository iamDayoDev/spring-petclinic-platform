apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/iamDayoDev/spring-petclinic-platform.git
      targetRevision: main
      path: helm/petclinic-service
      helm:
        releaseName: api-gateway
        valueFiles:
          - $values/helm-values/dev.yaml
          - $values/helm-values/api-gateway.yaml
        parameters:
          - name: ingress.enabled
            value: "true"
          - name: ingress.host
            value: petclinic.dayoclouddev.site
          - name: ingress.annotations.alb\.ingress\.kubernetes\.io/load-balancer-name
            value: petclinic-dev-alb
          - name: ingress.annotations.external-dns\.alpha\.kubernetes\.io/hostname
            value: petclinic.dayoclouddev.site
    - repoURL: https://github.com/iamDayoDev/spring-petclinic-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
