apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/Achievers11-DevOps/petclinic-k8s-platform.git
      targetRevision: main
      path: helm/petclinic-service
      helm:
        releaseName: api-gateway
        valueFiles:
          - $values/helm-values/prod.yaml
          - $values/helm-values/api-gateway.yaml
        parameters:
          - name: service.type
            value: LoadBalancer
          - name: ingress.enabled
            value: "false"
    - repoURL: https://github.com/Achievers11-DevOps/petclinic-k8s-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
