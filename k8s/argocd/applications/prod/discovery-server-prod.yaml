apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: discovery-server-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/iamDayoDev/spring-petclinic-platform.git
      targetRevision: main
      path: helm/petclinic-service
      helm:
        releaseName: discovery-server
        valueFiles:
          - $values/helm-values/prod.yaml
          - $values/helm-values/discovery-server.yaml
    - repoURL: https://github.com/iamDayoDev/spring-petclinic-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
